<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DTR-N | وحش البرمجة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh; min-height: 100dvh;
            overflow-x: hidden; position: relative;
            -webkit-text-size-adjust: 100%;
        }

        /* ===== MARBLE BACKGROUND ===== */
        .marble-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(139, 0, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(101, 67, 33, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.8) 0%, transparent 70%),
                linear-gradient(135deg, #0a0a0a 0%, #1a0a0a 25%, #0d0d0d 50%, #1a0a05 75%, #0a0a0a 100%);
        }
        .marble-bg::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.6;
        }
        .marble-bg::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse 600px 400px at 30% 40%, rgba(139, 0, 0, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 400px 600px at 70% 60%, rgba(101, 67, 33, 0.1) 0%, transparent 70%),
                radial-gradient(ellipse 300px 300px at 50% 80%, rgba(218, 165, 32, 0.05) 0%, transparent 70%);
        }

        /* ===== LIGHTNING ===== */
        .lightning-container {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1; overflow: hidden;
        }
        .lightning {
            position: absolute; width: 2px;
            background: linear-gradient(180deg, transparent, rgba(255, 215, 0, 0.8), rgba(255, 69, 0, 0.6), transparent);
            opacity: 0; filter: blur(1px);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(255, 69, 0, 0.3);
        }
        .lightning:nth-child(1) { left: 15%; height: 150px; top: -150px; animation: lightningStrike 4s infinite 0s; }
        .lightning:nth-child(2) { left: 45%; height: 200px; top: -200px; animation: lightningStrike 5s infinite 1.5s; }
        .lightning:nth-child(3) { left: 75%; height: 120px; top: -120px; animation: lightningStrike 3.5s infinite 2.8s; }
        .lightning:nth-child(4) { left: 85%; height: 180px; top: -180px; animation: lightningStrike 6s infinite 0.7s; }
        .lightning:nth-child(5) { left: 25%; height: 100px; top: -100px; animation: lightningStrike 4.5s infinite 3.2s; }
        @keyframes lightningStrike {
            0%, 90%, 100% { opacity: 0; transform: translateY(0); }
            91% { opacity: 1; transform: translateY(20vh); }
            92% { opacity: 0.3; transform: translateY(40vh); }
            93% { opacity: 1; transform: translateY(60vh); }
            94% { opacity: 0; transform: translateY(80vh); }
        }

        /* ===== PARTICLES ===== */
        .particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 2; overflow: hidden;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: rgba(218, 165, 32, 0.6); border-radius: 50%;
            box-shadow: 0 0 6px rgba(218, 165, 32, 0.4);
            animation: floatParticle 15s infinite linear;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(50px) rotate(720deg); opacity: 0; }
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; min-height: 100dvh;
            padding: 1rem; text-align: center;
        }

        /* ===== SKULL ===== */
        .skull-container {
            position: relative; margin-bottom: 1.5rem;
            animation: skullFloat 6s ease-in-out infinite;
        }
        @keyframes skullFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .skull-img {
            width: clamp(180px, 45vw, 320px); height: auto;
            filter: drop-shadow(0 0 30px rgba(139, 0, 0, 0.4)) drop-shadow(0 0 60px rgba(218, 165, 32, 0.2));
            border-radius: 20px; transition: all 0.5s ease;
        }
        .skull-img:hover {
            filter: drop-shadow(0 0 40px rgba(139, 0, 0, 0.6)) drop-shadow(0 0 80px rgba(218, 165, 32, 0.3));
            transform: scale(1.05);
        }
        .skull-glow-ring {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120%; height: 120%;
            border: 2px solid rgba(218, 165, 32, 0.2); border-radius: 50%;
            animation: pulseRing 3s ease-in-out infinite;
        }
        .skull-glow-ring:nth-child(2) {
            width: 140%; height: 140%;
            border-color: rgba(139, 0, 0, 0.15); animation-delay: 1s;
        }
        @keyframes pulseRing {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.2; }
        }

        /* ===== TITLE ===== */
        .title {
            font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900;
            background: linear-gradient(135deg, #8B0000, #CD5C5C, #FFD700, #8B4513, #8B0000);
            background-size: 300% 300%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite, titleGlow 2s ease-in-out infinite alternate;
            line-height: 1.2; margin-bottom: 0.5rem; letter-spacing: 2px;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 15px rgba(139, 0, 0, 0.4)); }
            to { filter: drop-shadow(0 0 30px rgba(218, 165, 32, 0.6)); }
        }
        .subtitle {
            color: rgba(205, 92, 92, 0.8);
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin-bottom: 2rem; letter-spacing: 4px;
            text-transform: uppercase; font-weight: 600;
        }

        /* ===== GLASS CARD ===== */
        .glass-card {
            background: rgba(20, 10, 10, 0.4);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(218, 165, 32, 0.2);
            border-radius: 24px; padding: 2rem;
            max-width: 600px; width: 100%;
            margin-bottom: 2rem; position: relative; overflow: hidden;
        }
        .glass-card::before {
            content: '';
            position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, rgba(139, 0, 0, 0.3), rgba(218, 165, 32, 0.2), rgba(139, 0, 0, 0.3));
            border-radius: 26px; z-index: -1; opacity: 0.5;
        }
        .glass-card::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 50%, rgba(255,255,255,0.01) 100%);
            border-radius: 24px; pointer-events: none;
        }
        .thank-text {
            font-family: 'Amiri', serif;
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: rgba(232, 232, 232, 0.9); line-height: 2; text-align: center;
        }
        .thank-text .highlight {
            color: #FFD700; font-weight: 700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* ===== CRYSTAL BUTTONS ===== */
        .btn-crystal {
            display: inline-block; padding: 1rem 2.5rem;
            border: none; border-radius: 16px;
            font-family: 'Cairo', sans-serif; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; position: relative; overflow: hidden; margin: 0.5rem;
        }
        .btn-crystal-primary {
            background: linear-gradient(135deg, rgba(139, 0, 0, 0.8), rgba(101, 67, 33, 0.9));
            color: #FFD700; border: 1px solid rgba(218, 165, 32, 0.4);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 30px rgba(218, 165, 32, 0.1);
        }
        .btn-crystal-primary::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            transition: left 0.5s;
        }
        .btn-crystal-primary:hover::before { left: 100%; }
        .btn-crystal-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(139, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.15), 0 0 40px rgba(218, 165, 32, 0.2);
            border-color: rgba(218, 165, 32, 0.6);
        }
        .btn-crystal-secondary {
            background: rgba(20, 10, 10, 0.5); color: rgba(205, 92, 92, 0.9);
            border: 1px solid rgba(139, 0, 0, 0.3); backdrop-filter: blur(10px);
        }
        .btn-crystal-secondary:hover {
            background: rgba(139, 0, 0, 0.2); color: #FFD700;
            border-color: rgba(218, 165, 32, 0.4); transform: translateY(-2px);
        }

        /* ===== GOLDEN BORDERS ===== */
        .gold-border-top {
            position: fixed; top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #8B0000, #FFD700, #8B4513, #FFD700, #8B0000, transparent);
            z-index: 100; animation: borderShine 3s linear infinite;
            background-size: 200% 100%;
        }
        .gold-border-bottom {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #8B0000, #FFD700, #8B4513, #FFD700, #8B0000, transparent);
            z-index: 100; animation: borderShine 3s linear infinite reverse;
            background-size: 200% 100%;
        }
        @keyframes borderShine {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ===== CORNERS ===== */
        .corner {
            position: fixed; width: 60px; height: 60px;
            z-index: 50; pointer-events: none;
        }
        .corner-tl { top: 10px; left: 10px; border-top: 2px solid rgba(218, 165, 32, 0.4); border-left: 2px solid rgba(218, 165, 32, 0.4); }
        .corner-tr { top: 10px; right: 10px; border-top: 2px solid rgba(218, 165, 32, 0.4); border-right: 2px solid rgba(218, 165, 32, 0.4); }
        .corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid rgba(218, 165, 32, 0.4); border-left: 2px solid rgba(218, 165, 32, 0.4); }
        .corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid rgba(218, 165, 32, 0.4); border-right: 2px solid rgba(218, 165, 32, 0.4); }

        /* ===== ENTRANCE ANIMATIONS ===== */
        .fade-in-up {
            opacity: 0; transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }
        .delay-5 { animation-delay: 1s; }

        @media (max-width: 480px) {
            .glass-card { padding: 1.5rem 1rem; }
            .btn-crystal { padding: 0.8rem 1.5rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="marble-bg"></div>

    <div class="lightning-container">
        <div class="lightning"></div>
        <div class="lightning"></div>
        <div class="lightning"></div>
        <div class="lightning"></div>
        <div class="lightning"></div>
    </div>

    <div class="particles" id="particles"></div>

    <div class="gold-border-top"></div>
    <div class="gold-border-bottom"></div>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="container">
        <div class="skull-container fade-in-up delay-1">
            <div class="skull-glow-ring"></div>
            <div class="skull-glow-ring"></div>
            <img src="https://images.unsplash.com/photo-1614726365723-49cfae9278b7?w=400&h=400&fit=crop&auto=format&q=80" 
                 alt="DTR-N Skull" class="skull-img" id="skullLogo"
                 onerror="this.src='https://cdn-icons-png.flaticon.com/512/2913/2913465.png'">
        </div>

        <h1 class="title fade-in-up delay-2">وحش البرمجة</h1>
        <p class="subtitle fade-in-up delay-3">DTR-N | نظام ذاتي التطوير والتعلم الذكي</p>

        <div class="glass-card fade-in-up delay-4">
            <p class="thank-text">
                من بعد فضل الله أشكر <span class="highlight">دولة مصر</span> لأنها أتاحت لي فرصة لكي أقوم بهذا العمل<br>
                لهذا أشكر <span class="highlight">الدولة</span> و<span class="highlight">الشعب المصري</span>
            </p>
        </div>

        <div class="fade-in-up delay-5">
            <a href="app.html" class="btn-crystal btn-crystal-primary">
                <i class="fas fa-rocket"></i> دخول النظام
            </a>
            <a href="https://github.com/omarlhlbwy441-netizen/dtr-n" target="_blank" class="btn-crystal btn-crystal-secondary">
                <i class="fab fa-github"></i> GitHub
            </a>
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (10 + Math.random() * 10) + 's';
            p.style.width = (2 + Math.random() * 4) + 'px';
            p.style.height = p.style.width;
            particlesContainer.appendChild(p);
        }
    </script>
</body>
</html>
